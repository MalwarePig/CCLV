 <!-- Modal Sin elementos -->
 <div class="modal fade" id="modalEditarAlumno" tabindex="-1" role="dialog" aria-labelledby="RecoleccionExito"
 aria-hidden="true">
 <div class="modal-dialog modal-lg" role="document">
     <div class="modal-content">
         <!-- Modal Header -->
        <div class="modal-header">
            <h4 class="modal-title">Registro</h4>
            <button type="button" class="close" data-dismiss="modal">&times;</button>
          </div>
          
          <div class="modal-body">
            <div class="row">
                <div class="form-group col-md-4">
                    <input required type="text" id="barAlumnoEditBuscar" class="form-control" placeholder="Nómbre / matricula..."
                      name="barAlumnoBuscar" autocomplete="off">
                  </div>
                  <div class="form-group col-md-1">
                    <button type="button"  name="getProducts" class="btn btn-secondary"
                      onclick="BuscarAlumnoEdit()">Buscar</button>
                  </div>
            </div>
            <hr>
            <form id="Formulario">
              <div class="form-group">
      
                <div class="form-row">
                  <div class="col">
                    <label for="recipient-name" class="col-form-label">Fecha de registro:</label>
                    <input type="text" class="form-control" id="Edit_FechaRegistro" readonly placeholder="dd / mm / aaaa hh:mm">
                  </div>
                 
                  <div class="col">
                    <label for="recipient-name" class="col-form-label">Turno:</label>
                    <select required id="Edit_Turno" name="Area" class="form-control">
                      <option value="Matutino" selected>Matutino</option>
                      <option value="Vespertino">Vespertino</option>
                    </select>
                  </div>
                </div>
      
                <hr>

                <div class="form-row">
                  <div class="col">
                    <label for="recipient-name" class="col-form-label">Nombres:</label>
                    <input type="text" class="form-control" id="Edit_Nombres" required>
                  </div>
                  <div class="col">
                    <label for="recipient-name" class="col-form-label">Apellido Paterno:</label>
                    <input type="text" class="form-control" id="Edit_Paterno">
                  </div>
                  <div class="col">
                    <label for="recipient-name" class="col-form-label">Apellido Materno:</label>
                    <input type="text" class="form-control" id="Edit_Materno">
                  </div>
                </div>
      
                <hr>

                <div class="form-row">
                  <div class="col">
                     <label for="recipient-name" class="col-form-label">Fecha de nacimiento:</label>
                    <input type="text" class="form-control" id="Edit_FechaNacimiento" placeholder="dd / mm / aaaa">
                  </div>
                  <div class="col">
                    <label for="recipient-name" class="col-form-label">Sexo:</label>
                    <select required id="Edit_Sexo" name="Area" class="form-control">
                        <option value="Femenino" selected>Femenino</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Otro">Otro</option>
                      </select>
                  </div>
                </div> 

              </div>
            </form>
          </div>
       
         <div class="modal-footer">
            <button type="button" class="btn btn-light" onclick="AtualizarAlumno()" >Guardar</button>
             <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
         </div>
     </div>
 </div>
</div>
